<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Price Tracker - Analytics</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Place on-air-momentum font files in /static/fonts/ and uncomment:
        @font-face {
            font-family: 'on-air-momentum';
            src: url('/fonts/on-air-momentum.woff2') format('woff2'),
                 url('/fonts/on-air-momentum.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        */
        .gradient-header { background: linear-gradient(135deg, #001687 0%, #0050ff 50%, #ed0100 100%); color: white; padding: 16px 24px; }
        .o2-badge { background: #001687; }
        .selected-row { background-color: #e8efff !important; border-left: 4px solid #0050ff; }
        .price-up { color: #ed0100; }
        .price-down { color: #10B981; }
        #plansTable tr:hover { background: #f9fafb; }
        #plansTable tr.selected { background: #e8efff; border-left: 4px solid #0050ff; }
        #plansTable tr { cursor: pointer; }
        body { font-family: 'on-air-momentum', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f9fafb; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 10px 16px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f3f4f6; font-weight: 600; font-size: 13px; color: #4b5563; }
        select, input { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; }
        button { cursor: pointer; border: none; padding: 6px 12px; border-radius: 6px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="gradient-header text-white py-4 px-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">SIM Price Tracker</h1>
                <p class="text-sm opacity-80">Analytics Dashboard</p>
            </div>
            <div class="flex gap-2 items-center">
                <span id="planCount" class="text-sm"></span>
                <button onclick="loadData()" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-sm">Refresh</button>
                <button onclick="showUploadModal()" style="background:#5f2878" class="hover:opacity-90 px-3 py-1 rounded text-sm font-medium text-white">Upload Data</button>
                <a href="/download-scraper" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-sm no-underline text-white">Download Scraper</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Network</label>
                    <select id="filterNetwork" onchange="applyFilters()" class="w-full rounded-md border-gray-300 p-2 border">
                        <option value="">All Networks</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                    <select id="filterData" onchange="applyFilters()" class="w-full rounded-md border-gray-300 p-2 border">
                        <option value="">All Data</option>
                        <option value="1-5">1-5 GB</option>
                        <option value="6-15">6-15 GB</option>
                        <option value="16-50">16-50 GB</option>
                        <option value="51-100">51-100 GB</option>
                        <option value="101+">100+ GB</option>
                        <option value="unlimited">Unlimited</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contract</label>
                    <select id="filterContract" onchange="applyFilters()" class="w-full rounded-md border-gray-300 p-2 border">
                        <option value="">All Lengths</option>
                        <option value="1">1 Month</option>
                        <option value="12">12 Months</option>
                        <option value="24">24 Months</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Max Price</label>
                    <input type="number" id="filterMaxPrice" placeholder="50" oninput="applyFilters()" class="w-full rounded-md border-gray-300 p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Source</label>
                    <select id="filterSource" onchange="applyFilters()" class="w-full rounded-md border-gray-300 p-2 border">
                        <option value="">All Sources</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Price Distribution by Network</h3>
                <canvas id="priceDistChart" height="200"></canvas>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Average Price by Data Amount</h3>
                <canvas id="dataVsPriceChart" height="200"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-lg shadow">
                <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-800">SIM Plans</h3>
                    <span id="filteredCount" class="text-sm text-gray-500"></span>
                </div>
                <div class="overflow-x-auto max-h-96 overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onclick="sortTable('network')">Network</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onclick="sortTable('name')">Plan</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onclick="sortTable('price')">Price</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-600 cursor-pointer hover:bg-gray-100" onclick="sortTable('data')">Data</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-600">Contract</th>
                            </tr>
                        </thead>
                        <tbody id="plansTable" class="divide-y divide-gray-100">
                            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">Loading plans...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow">
                <div class="p-4 border-b border-gray-200 text-white rounded-t-lg" style="background:linear-gradient(135deg, #001687, #0050ff)">
                    <h3 class="text-lg font-semibold">O2 Comparison</h3>
                    <p class="text-sm opacity-80">Select a plan to compare</p>
                </div>
                <div id="o2ComparePanel" class="p-4">
                    <p class="text-gray-500 text-sm text-center py-8">Click on any plan to see the closest O2 equivalent</p>
                </div>
            </div>
        </div>

        <div id="priceHistorySection" class="mt-6 bg-white rounded-lg shadow" style="display:none">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-800">Price History</h3>
                <span id="selectedPlanName" class="text-sm text-gray-500"></span>
            </div>
            <div class="p-4">
                <canvas id="priceHistoryChart" height="120"></canvas>
            </div>
        </div>
    </main>

    <script>
        var allPlans = [];
        var filteredPlans = [];
        var selectedPlan = null;
        var o2Plans = [];
        var priceDistChart = null;
        var dataVsPriceChart = null;
        var priceHistoryChart = null;
        var sortColumn = 'price';
        var sortAsc = true;
        var scrapePolling = null;
        var API_BASE = window.location.origin;

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            try {
                document.getElementById('planCount').textContent = 'Loading...';
                var response = await fetch(API_BASE + '/api/v1/plans');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var data = await response.json();
                allPlans = data.plans || data || [];
                o2Plans = allPlans.filter(function(p) {
                    var net = (p.network_provider || '').toLowerCase();
                    var prov = (p.provider_name || '').toLowerCase();
                    return net.indexOf('o2') >= 0 || prov.indexOf('o2') >= 0;
                });
                populateNetworkFilter();
                populateSourceFilter();
                applyFilters();
                document.getElementById('planCount').textContent = allPlans.length + ' plans';
                try { updateCharts(); } catch(ce) { console.warn('Charts unavailable:', ce.message); }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('planCount').textContent = 'Error: ' + error.message;
                document.getElementById('plansTable').innerHTML =
                    '<tr><td colspan="5" style="padding:32px;text-align:center;color:#ef4444">Failed to load data: ' + error.message + '</td></tr>';
            }
        }

        function populateNetworkFilter() {
            var networks = [];
            var seen = {};
            allPlans.forEach(function(p) {
                var n = p.network_provider || p.provider_name || 'Unknown';
                if (!seen[n]) { seen[n] = true; networks.push(n); }
            });
            var sel = document.getElementById('filterNetwork');
            sel.innerHTML = '<option value="">All Networks</option>' +
                networks.sort().map(function(n) { return '<option value="' + n + '">' + n + '</option>'; }).join('');
        }

        function populateSourceFilter() {
            var sources = [];
            var seen = {};
            allPlans.forEach(function(p) {
                var s = extractSource(p.url);
                if (s && !seen[s]) { seen[s] = true; sources.push(s); }
            });
            var sel = document.getElementById('filterSource');
            sel.innerHTML = '<option value="">All Sources</option>' +
                sources.sort().map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');
        }

        function extractSource(url) {
            if (!url) return 'Unknown';
            try { return new URL(url).hostname.replace('www.', '').split('.')[0]; } catch(e) { return 'Unknown'; }
        }

        function applyFilters() {
            var network = document.getElementById('filterNetwork').value;
            var dataFilter = document.getElementById('filterData').value;
            var contract = document.getElementById('filterContract').value;
            var maxPrice = parseFloat(document.getElementById('filterMaxPrice').value) || Infinity;
            var source = document.getElementById('filterSource').value;

            filteredPlans = allPlans.filter(function(plan) {
                var planNetwork = plan.network_provider || plan.provider_name || '';
                var planData = plan.data_gb;
                var planUnlimited = plan.data_unlimited;
                var planContract = plan.contract_months;
                var planPrice = plan.current_price || plan.price || 0;
                var planSource = extractSource(plan.url);

                if (network && planNetwork.toLowerCase().indexOf(network.toLowerCase()) < 0) return false;
                if (source && planSource.toLowerCase() !== source.toLowerCase()) return false;
                if (dataFilter) {
                    if (dataFilter === 'unlimited' && !planUnlimited) return false;
                    if (dataFilter !== 'unlimited') {
                        if (dataFilter.indexOf('+') >= 0) {
                            var min = parseInt(dataFilter);
                            if (planUnlimited || !planData || planData < min) return false;
                        } else {
                            var parts = dataFilter.split('-').map(Number);
                            if (planUnlimited || !planData || planData < parts[0] || planData > parts[1]) return false;
                        }
                    }
                }
                if (contract && planContract != contract) return false;
                if (planPrice > maxPrice) return false;
                return true;
            });
            sortPlans();
            renderTable();
            document.getElementById('filteredCount').textContent = 'Showing ' + filteredPlans.length + ' of ' + allPlans.length;
        }

        function sortTable(column) {
            if (sortColumn === column) { sortAsc = !sortAsc; } else { sortColumn = column; sortAsc = true; }
            sortPlans();
            renderTable();
        }

        function sortPlans() {
            filteredPlans.sort(function(a, b) {
                var valA, valB;
                switch(sortColumn) {
                    case 'network': valA = (a.network_provider || a.provider_name || '').toLowerCase(); valB = (b.network_provider || b.provider_name || '').toLowerCase(); break;
                    case 'name': valA = (a.name || '').toLowerCase(); valB = (b.name || '').toLowerCase(); break;
                    case 'price': valA = a.current_price || a.price || 0; valB = b.current_price || b.price || 0; break;
                    case 'data': valA = a.data_unlimited ? 9999 : (a.data_gb || 0); valB = b.data_unlimited ? 9999 : (b.data_gb || 0); break;
                    default: valA = a[sortColumn]; valB = b[sortColumn];
                }
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function renderTable() {
            var tbody = document.getElementById('plansTable');
            if (filteredPlans.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No plans match your filters</td></tr>';
                return;
            }
            var rows = filteredPlans.slice(0, 200).map(function(plan, idx) {
                var network = plan.network_provider || plan.provider_name || 'Unknown';
                var price = plan.current_price || plan.price || 0;
                var dataStr = plan.data_unlimited ? 'Unlimited' : (plan.data_gb ? plan.data_gb + ' GB' : '?');
                var contractStr = plan.contract_months ? plan.contract_months + ' mo' : '?';
                var sel = selectedPlan && selectedPlan.id === plan.id;
                return '<tr class="' + (sel ? 'selected' : '') + '" onclick="selectPlan(' + idx + ')">' +
                    '<td class="px-4 py-3 font-medium">' + network + '</td>' +
                    '<td class="px-4 py-3">' + (plan.name || 'Unknown') + '</td>' +
                    '<td class="px-4 py-3 font-semibold">&pound;' + price.toFixed(2) + '</td>' +
                    '<td class="px-4 py-3">' + dataStr + '</td>' +
                    '<td class="px-4 py-3">' + contractStr + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = rows.join('');
        }

        function selectPlan(index) {
            selectedPlan = filteredPlans[index];
            renderTable();
            showO2Comparison(selectedPlan);
            showPriceHistory(selectedPlan);
        }

        function showO2Comparison(plan) {
            var panel = document.getElementById('o2ComparePanel');
            if (!plan) {
                panel.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">Click on any plan to compare</p>';
                return;
            }
            var planData = plan.data_unlimited ? 9999 : (plan.data_gb || 0);
            var planPrice = plan.current_price || plan.price || 0;
            var planContract = plan.contract_months || 12;
            var closestO2 = null;
            var minScore = Infinity;
            o2Plans.forEach(function(o2) {
                var o2Data = o2.data_unlimited ? 9999 : (o2.data_gb || 0);
                var o2Contract = o2.contract_months || 12;
                var score = Math.abs(planData - o2Data) + (planContract === o2Contract ? 0 : 50);
                if (score < minScore) { minScore = score; closestO2 = o2; }
            });

            var planDataStr = plan.data_unlimited ? 'Unlimited' : (plan.data_gb || '?') + ' GB';
            var selectedHtml =
                '<div class="p-3 bg-gray-50 rounded-lg mb-3">' +
                '<p class="text-xs text-gray-400 uppercase mb-1">Selected</p>' +
                '<p class="font-semibold">' + (plan.name || 'Unknown') + '</p>' +
                '<p class="text-sm text-gray-500">' + planDataStr + ' | ' + (plan.contract_months || '?') + ' mo</p>' +
                '<p class="text-xl font-bold mt-2">&pound;' + planPrice.toFixed(2) + '/mo</p>' +
                '</div>';

            if (!closestO2) {
                panel.innerHTML = selectedHtml +
                    '<p class="text-center text-gray-400 py-4">No O2 equivalent found</p>';
                return;
            }

            var o2Price = closestO2.current_price || closestO2.price || 0;
            var priceDiff = o2Price - planPrice;
            var diffColor = priceDiff > 0 ? '#ed0100' : (priceDiff < 0 ? '#10B981' : '#999');
            var diffLabel = priceDiff > 0 ? ('+&pound;' + priceDiff.toFixed(2) + ' more') :
                           (priceDiff < 0 ? ('&pound;' + Math.abs(priceDiff).toFixed(2) + ' less') : 'Same price');
            var o2DataStr = closestO2.data_unlimited ? 'Unlimited' : (closestO2.data_gb || '?') + ' GB';

            panel.innerHTML = selectedHtml +
                '<div class="text-center text-2xl text-gray-300 my-2">&#8595;</div>' +
                '<div class="p-3 bg-blue-50 rounded-lg border-2 border-blue-200">' +
                '<div class="flex items-center gap-2 mb-2">' +
                '<span style="background:#001687" class="text-white px-2 py-0.5 rounded text-xs font-bold">O2</span>' +
                '<span class="text-xs text-gray-400">Closest Match</span>' +
                '</div>' +
                '<p class="font-semibold">' + (closestO2.name || 'O2 Plan') + '</p>' +
                '<p class="text-sm text-gray-500">' + o2DataStr + ' | ' + (closestO2.contract_months || '?') + ' mo</p>' +
                '<p class="text-xl font-bold mt-2">&pound;' + o2Price.toFixed(2) + '/mo</p>' +
                '<p class="mt-2 font-medium" style="color:' + diffColor + '">' + diffLabel + '</p>' +
                '</div>' +
                (closestO2.url ? '<a href="' + closestO2.url + '" target="_blank" class="block text-center mt-3 text-blue-600 hover:underline text-sm">View on O2 &rarr;</a>' : '');
        }

        function showPriceHistory(plan) {
            var section = document.getElementById('priceHistorySection');
            var nameSpan = document.getElementById('selectedPlanName');
            section.style.display = 'block';
            nameSpan.textContent = plan.name || 'Selected Plan';
            var ctx = document.getElementById('priceHistoryChart').getContext('2d');
            if (priceHistoryChart) priceHistoryChart.destroy();

            if (typeof Chart === 'undefined') { return; }
            fetch(API_BASE + '/api/v1/plans/' + plan.id + '/history')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var history = data.history || [];
                    var labels, prices;
                    if (history.length > 1) {
                        labels = history.map(function(h) {
                            var d = new Date(h.date);
                            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                        });
                        prices = history.map(function(h) { return h.price; });
                    } else {
                        var price = plan.current_price || plan.price || 0;
                        labels = [];
                        prices = [];
                        var today = new Date();
                        for (var i = 6; i >= 0; i--) {
                            var d = new Date(today);
                            d.setDate(d.getDate() - i * 7);
                            labels.push(d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
                            prices.push(price);
                        }
                    }
                    priceHistoryChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Price',
                                data: prices,
                                borderColor: '#0050ff',
                                backgroundColor: 'rgba(0, 80, 255, 0.1)',
                                fill: true,
                                tension: 0.3
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                })
                .catch(function(e) { console.error('History error:', e); });
        }

        function updateCharts() {
            if (typeof Chart === 'undefined') { console.warn('Chart.js not loaded'); return; }
            var networkPrices = {};
            allPlans.forEach(function(p) {
                var n = p.network_provider || p.provider_name || 'Other';
                var pr = p.current_price || p.price || 0;
                if (!networkPrices[n]) networkPrices[n] = [];
                networkPrices[n].push(pr);
            });
            var nets = Object.keys(networkPrices).sort();
            var avgs = nets.map(function(n) { return networkPrices[n].reduce(function(a, b) { return a + b; }, 0) / networkPrices[n].length; });
            var colors = ['#0050ff', '#ed0100', '#5f2878', '#001687', '#10B981', '#F59E0B', '#0050ff', '#5f2878'];

            if (priceDistChart) priceDistChart.destroy();
            priceDistChart = new Chart(document.getElementById('priceDistChart'), {
                type: 'bar',
                data: { labels: nets.slice(0, 8), datasets: [{ data: avgs.slice(0, 8), backgroundColor: colors }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            var dataCats = { '1-5 GB': [], '6-15 GB': [], '16-50 GB': [], '51-100 GB': [], '100+ GB': [], 'Unlimited': [] };
            allPlans.forEach(function(p) {
                var pr = p.current_price || p.price || 0;
                var d = p.data_unlimited ? 9999 : (p.data_gb || 0);
                if (d >= 1000) dataCats['Unlimited'].push(pr);
                else if (d > 100) dataCats['100+ GB'].push(pr);
                else if (d > 50) dataCats['51-100 GB'].push(pr);
                else if (d > 15) dataCats['16-50 GB'].push(pr);
                else if (d > 5) dataCats['6-15 GB'].push(pr);
                else dataCats['1-5 GB'].push(pr);
            });
            var catLabels = Object.keys(dataCats);
            var catAvgs = catLabels.map(function(c) {
                return dataCats[c].length > 0 ? dataCats[c].reduce(function(a, b) { return a + b; }, 0) / dataCats[c].length : 0;
            });

            if (dataVsPriceChart) dataVsPriceChart.destroy();
            dataVsPriceChart = new Chart(document.getElementById('dataVsPriceChart'), {
                type: 'bar',
                data: { labels: catLabels, datasets: [{ data: catAvgs, backgroundColor: '#5f2878' }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        async function startScrape() {
            try {
                var btn = document.getElementById('scrapeBtn');
                btn.textContent = 'Starting...';
                btn.disabled = true;
                var r = await fetch(API_BASE + '/api/v1/scrape/start', { method: 'POST' });
                var d = await r.json();
                if (d.status === 'already_running') {
                    btn.textContent = 'In Progress...';
                    showScrapeProgress();
                    scrapePolling = setInterval(pollScrapeProgress, 2000);
                    return;
                }
                btn.textContent = 'Scraping...';
                showScrapeProgress();
                scrapePolling = setInterval(pollScrapeProgress, 2000);
            } catch (e) {
                alert('Failed to start scrape: ' + e.message);
                var btn2 = document.getElementById('scrapeBtn');
                btn2.textContent = 'Run Scrape';
                btn2.disabled = false;
            }
        }

        function showScrapeProgress() {
            var bar = document.getElementById('scrapeProgressBar');
            if (bar) return;
            var container = document.createElement('div');
            container.id = 'scrapeProgressBar';
            container.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1E293B;color:white;padding:16px 24px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);font-family:monospace;max-height:40vh;overflow-y:auto';
            container.innerHTML =
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
                '<span style="font-weight:700;font-size:14px">Scrape In Progress</span>' +
                '<div><span id="scrapeStats" style="font-size:12px;opacity:0.8"></span>' +
                '<button onclick="closeScrapeBar()" style="margin-left:12px;background:#ed0100;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">Close</button>' +
                '</div></div>' +
                '<div style="background:#374151;border-radius:4px;height:6px;margin-bottom:8px">' +
                '<div id="scrapeBar" style="height:100%;background:linear-gradient(90deg,#001687,#0050ff);border-radius:4px;transition:width 0.3s;width:0%"></div>' +
                '</div>' +
                '<div id="scrapeLogs" style="font-size:11px;line-height:1.6;max-height:20vh;overflow-y:auto;opacity:0.9"></div>';
            document.body.appendChild(container);
        }

        async function pollScrapeProgress() {
            try {
                var r = await fetch(API_BASE + '/api/v1/scrape/progress');
                var d = await r.json();
                var pct = d.total > 0 ? Math.round((d.completed / d.total) * 100) : 0;
                var bar = document.getElementById('scrapeBar');
                var stats = document.getElementById('scrapeStats');
                var logs = document.getElementById('scrapeLogs');
                if (bar) bar.style.width = pct + '%';
                if (stats) stats.textContent = d.completed + '/' + d.total + ' providers | ' + d.plans_found + ' plans | ' + pct + '%';
                if (logs && d.logs) {
                    var logLines = d.logs.slice(-30).map(function(l) {
                        var color = '#9CA3AF';
                        if (l.indexOf('found') >= 0 && l.indexOf('0 plans') < 0) color = '#34D399';
                        if (l.indexOf('Error') >= 0 || l.indexOf('error') >= 0) color = '#F87171';
                        if (l.indexOf('Scraping') >= 0) color = '#60A5FA';
                        if (l.indexOf('complete') >= 0) color = '#FBBF24';
                        return '<div style="color:' + color + '">' + l + '</div>';
                    });
                    logs.innerHTML = logLines.join('');
                    logs.scrollTop = logs.scrollHeight;
                }
                if (!d.running && d.completed > 0) {
                    clearInterval(scrapePolling);
                    scrapePolling = null;
                    if (bar) bar.style.width = '100%';
                    if (stats) stats.textContent = 'Complete! ' + d.plans_found + ' plans found';
                    var btn = document.getElementById('scrapeBtn');
                    btn.textContent = 'Run Scrape';
                    btn.disabled = false;
                    setTimeout(loadData, 1000);
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }

        function closeScrapeBar() {
            var bar = document.getElementById('scrapeProgressBar');
            if (bar) bar.remove();
            if (scrapePolling) { clearInterval(scrapePolling); scrapePolling = null; }
            var btn = document.getElementById('scrapeBtn');
            if (btn) { btn.textContent = 'Run Scrape'; btn.disabled = false; }
        }

        function showUploadModal() {
            if (document.getElementById('uploadModal')) return;
            var modal = document.createElement('div');
            modal.id = 'uploadModal';
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center';
            modal.innerHTML =
                '<div style="background:white;border-radius:12px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3)">' +
                '<h2 style="margin:0 0 8px;font-size:20px;font-weight:700;color:#1f2937">Upload Scrape Data</h2>' +
                '<p style="margin:0 0 20px;color:#6b7280;font-size:14px">Select the JSON file saved by the scraper app</p>' +
                '<div id="dropZone" style="border:2px dashed #d1d5db;border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s" ' +
                'onclick="document.getElementById(\'fileInput\').click()" ' +
                'ondragover="event.preventDefault();this.style.borderColor=\'#0050ff\';this.style.background=\'#e8efff\'" ' +
                'ondragleave="this.style.borderColor=\'#d1d5db\';this.style.background=\'white\'" ' +
                'ondrop="handleDrop(event)">' +
                '<div style="font-size:36px;margin-bottom:8px">&#128196;</div>' +
                '<p style="margin:0;font-weight:600;color:#374151">Drag & drop your file here</p>' +
                '<p style="margin:4px 0 0;color:#9ca3af;font-size:13px">or click to browse</p>' +
                '<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileSelect(this.files[0])">' +
                '</div>' +
                '<div id="uploadStatus" style="margin-top:16px;display:none"></div>' +
                '<div style="margin-top:20px;display:flex;justify-content:flex-end;gap:8px">' +
                '<button onclick="closeUploadModal()" style="padding:8px 16px;border-radius:6px;border:1px solid #d1d5db;background:white;color:#374151;font-size:14px;cursor:pointer">Cancel</button>' +
                '</div>' +
                '</div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) closeUploadModal(); });
        }

        function closeUploadModal() {
            var modal = document.getElementById('uploadModal');
            if (modal) modal.remove();
        }

        function handleDrop(e) {
            e.preventDefault();
            var dropZone = document.getElementById('dropZone');
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.background = 'white';
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        }

        function handleFileSelect(file) {
            if (!file) return;
            if (!file.name.endsWith('.json')) {
                showUploadStatus('Please select a .json file', 'error');
                return;
            }

            var dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '<div style="color:#0050ff;font-weight:600">&#9989; ' + file.name + '</div>' +
                '<p style="margin:4px 0 0;color:#6b7280;font-size:13px">' + (file.size / 1024).toFixed(1) + ' KB</p>';

            showUploadStatus('Uploading...', 'loading');

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    uploadData(data);
                } catch (err) {
                    showUploadStatus('Invalid JSON file: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        async function uploadData(data) {
            try {
                var payload = {
                    results: data.results || [],
                    uploaded_by: 'dashboard_upload'
                };
                var resp = await fetch(API_BASE + '/api/v1/upload-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                var result = await resp.json();
                if (result.status === 'success') {
                    showUploadStatus('Uploaded ' + result.plans_saved + ' plans from ' + result.providers_saved + ' providers!', 'success');
                    setTimeout(function() { closeUploadModal(); loadData(); }, 2000);
                } else {
                    showUploadStatus('Upload failed: ' + (result.message || 'Unknown error'), 'error');
                }
            } catch (err) {
                showUploadStatus('Upload failed: ' + err.message, 'error');
            }
        }

        function showUploadStatus(msg, type) {
            var el = document.getElementById('uploadStatus');
            el.style.display = 'block';
            var color = type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : '#6b7280';
            var bg = type === 'success' ? '#ECFDF5' : type === 'error' ? '#FEF2F2' : '#F9FAFB';
            el.innerHTML = '<div style="padding:10px 14px;border-radius:6px;background:' + bg + ';color:' + color + ';font-size:14px;font-weight:500">' + msg + '</div>';
        }
    </script>
</body>
</html>
